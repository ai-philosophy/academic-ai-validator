on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    env:
      APP_CORS_ALLOWED_ORIGINS: ${{ secrets.APP_CORS_ALLOWED_ORIGINS }}
      GITHUB_MODELS_TOKEN: ${{ secrets.GITHUB_MODELS_TOKEN }}
      ACADEMIC_EVIDENCE_ENABLED: ${{ secrets.ACADEMIC_EVIDENCE_ENABLED }}
      ACADEMIC_EVIDENCE_MAX_CLAIMS: ${{ secrets.ACADEMIC_EVIDENCE_MAX_CLAIMS }}
      ACADEMIC_EVIDENCE_MAX_SOURCES_PER_CLAIM: ${{ secrets.ACADEMIC_EVIDENCE_MAX_SOURCES_PER_CLAIM }}
    steps:
      - name: Checkout Develop
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor}}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Clean Container, Image And Prepare For Deploy
        run: docker compose -f docker-compose.prod.yaml -p academic-ai-validator down --rmi all -v
      - name: Deploy Application
        run: docker compose -f docker-compose.prod.yaml -p academic-ai-validator up -d --build
