spring.application.name=AIAcademy
server.port=${PORT:8080}

# GitHub Models integration.
# Do not put a personal token in git. Prefer an environment variable:
# export GITHUB_MODELS_TOKEN=your-token
github.models.enabled=${GITHUB_MODELS_ENABLED:true}
github.models.endpoint=https://models.github.ai/inference
github.models.model=openai/gpt-4.1
github.models.api-version=2026-03-10
github.models.token=${GITHUB_MODELS_TOKEN:${GITHUB_TOKEN:}}

academic.evidence.enabled=${ACADEMIC_EVIDENCE_ENABLED:true}
academic.evidence.max-claims=${ACADEMIC_EVIDENCE_MAX_CLAIMS:6}
academic.evidence.max-sources-per-claim=${ACADEMIC_EVIDENCE_MAX_SOURCES_PER_CLAIM:4}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}
