services:
  backend:
    build:
      context: ./AIAcademy
    image: aiacademy-backend:latest
    restart: unless-stopped
    environment:
      PORT: 8080
      GITHUB_MODELS_ENABLED: ${GITHUB_MODELS_ENABLED:-true}
      GITHUB_MODELS_TOKEN: ${GITHUB_MODELS_TOKEN}
      ACADEMIC_EVIDENCE_ENABLED: ${ACADEMIC_EVIDENCE_ENABLED:-true}
      ACADEMIC_EVIDENCE_MAX_CLAIMS: ${ACADEMIC_EVIDENCE_MAX_CLAIMS:-6}
      ACADEMIC_EVIDENCE_MAX_SOURCES_PER_CLAIM: ${ACADEMIC_EVIDENCE_MAX_SOURCES_PER_CLAIM:-4}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost}
      JAVA_OPTS: ${JAVA_OPTS:-}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ${API_BASE}
    image: aiacademy-frontend:latest
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
